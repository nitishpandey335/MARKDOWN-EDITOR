# LoadBalancer exposes the frontend to the internet
# On AWS EKS this automatically provisions an AWS ALB/NLB
# On Minikube: run "minikube tunnel" to get an external IP
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: markdown-editor
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
