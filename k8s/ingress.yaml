# Ingress routes external HTTP traffic to the right service
# Requires an Ingress Controller (nginx-ingress) installed on the cluster
# Install: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# On AWS EKS, use the AWS Load Balancer Controller instead for ALB integration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: markdown-editor
  annotations:
    # Use nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # Redirect HTTP → HTTPS automatically
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Enable gzip compression at ingress level
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    # Increase proxy timeout for slow API calls
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    - host: yourdomain.com   # replace with your actual domain
      http:
        paths:
          # All /api/* requests go to the backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Everything else goes to the frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
  # TLS config (get cert via cert-manager + Let's Encrypt)
  tls:
    - hosts:
        - yourdomain.com
      secretName: app-tls-secret   # cert-manager will populate this
