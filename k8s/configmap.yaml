# ConfigMap holds non-sensitive configuration values
# These are injected as environment variables into pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: markdown-editor
data:
  NODE_ENV: "production"
  PORT: "5000"
  # Frontend talks to backend via the K8s Service DNS name
  VITE_BACKEND_URL: "http://backend-service:5000/api"
