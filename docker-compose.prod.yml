# ─────────────────────────────────────────────────────────────────
# Production Docker Compose — runs everything on EC2
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Services:
#   frontend   → http://<EC2_IP>:80
#   backend    → http://<EC2_IP>:5000
#   prometheus → http://<EC2_IP>:9090
#   grafana    → http://<EC2_IP>:3000
# ─────────────────────────────────────────────────────────────────

services:

  # ── Backend (Node.js / Express) ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: markdown-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://${EC2_IP:-localhost}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (React → Nginx) ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        # Pass EC2 IP so Vite bakes the correct API URL into the build
        VITE_BACKEND_URL: http://${EC2_IP:-localhost}:5000/api
    container_name: markdown-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: markdown-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - app-network

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: markdown-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Auto-provision Prometheus as datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboard-files:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app-network

  # ── Node Exporter — EC2 host metrics (CPU, RAM, Disk) ────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: markdown-node-exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - app-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
